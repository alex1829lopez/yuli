<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        height: 100vh;
        font-family: 'Press Start 2P', cursive;
        background: radial-gradient(circle at center, #2b0011, #000);
        background-image: url('diseno-fondo-acuarela-roja-oscura-pintada-mano_1048-20385.jpg'); /* reemplaza por una textura si quieres */
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 50%, #640000 0%, #1a0000 100%);
        mix-blend-mode: lighten;
        filter: blur(80px);
        z-index: 0;
    }

    .login-box {
        position: relative;
        z-index: 1;
        background: rgba(40, 0, 0, 0.8);
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        text-align: center;
        width: 350px;
        border: 1px solid #000;
    }

    .login-box h2 {
        color: #ff6600;
        font-size: 18px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .login-box h2 span {
        font-size: 24px;
    }

    .login-box input {
        display: block;
        width: 80%;
        margin: 15px auto;
        padding: 15px;
        border: none;
        border-radius: 15px;
        background: rgba(150, 0, 0, 0.7);
        color: #ccc;
        font-size: 16px;
        text-align: center;
        outline: none;
    }

    .login-box button {
        display: block;
        width: 50%;
        margin: 20px auto 0;
        padding: 10px;
        border: none;
        border-radius: 15px;
        background: rgba(180, 0, 0, 0.8);
        color: #ccc;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-box button:hover {
        background: rgba(255, 80, 80, 0.9);
    }
</style>
</head>
<body>
    <div class="login-box">
        <h2><span>🔒</span>Iniciar Sesión</h2>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="contrasena" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Entrar</button>
    </div>

    <script>
        function iniciarSesion() {
            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;

            if (usuario === 'billie' && contrasena === 'eilish') {
                // Redirecciona a otra página
                window.location.href = 'alamcen.php'; // Asegúrate de tener este archivo
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        }
    </script>
</body>
</html>
